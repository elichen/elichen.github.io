<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The LLM History Book</title>
    <meta name="description" content="An interactive book about the history of large language models from GPT-1 to the frontier models of 2026.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500;6..72,600&family=Geist:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a class="skip-link" href="#reader">Skip to chapter</a>
    <div class="progress" id="readingProgress"></div>

    <header class="topbar">
        <button class="icon-button" id="openContents" type="button" aria-controls="contentsDrawer" aria-expanded="false" aria-label="Contents">
            <i data-lucide="menu" aria-hidden="true"></i>
        </button>

        <div class="book-title">
            <h1>The LLM History Book</h1>
        </div>

        <div class="top-actions">
            <button class="icon-button" id="openAtlas" type="button" aria-controls="atlasDrawer" aria-expanded="false" aria-label="Atlas">
                <i data-lucide="compass" aria-hidden="true"></i>
            </button>
            <button class="icon-button" id="openSearch" type="button" aria-controls="searchOverlay" aria-expanded="false" aria-label="Search">
                <i data-lucide="search" aria-hidden="true"></i>
            </button>
            <button class="icon-button" id="themeToggle" type="button" aria-label="Toggle theme">
                <i data-lucide="sun-moon" aria-hidden="true"></i>
            </button>
        </div>
    </header>

    <main id="reader" class="reader" tabindex="-1">
        <div class="running-head">
            <span id="runningChapter"></span>
            <span id="folio"></span>
        </div>

        <h2 id="chapterTitle"></h2>
        <p class="chapter-dek" id="chapterDek"></p>

        <article class="chapter-content" id="chapterContent"></article>

        <nav class="chapter-controls" aria-label="Chapter navigation">
            <button id="prevChapter" type="button">
                <i data-lucide="arrow-left" aria-hidden="true"></i>
                <span>Previous</span>
            </button>
            <button id="nextChapter" type="button">
                <span>Next</span>
                <i data-lucide="arrow-right" aria-hidden="true"></i>
            </button>
        </nav>
    </main>

    <!-- Contents drawer -->
    <aside id="contentsDrawer" class="drawer drawer-left" aria-hidden="true" aria-label="Contents">
        <header class="drawer-head">
            <div>
                <span class="drawer-eyebrow">Webbook</span>
                <h2>Contents</h2>
            </div>
            <span id="chapterCount"></span>
            <button class="icon-button drawer-close" type="button" data-close aria-label="Close contents">
                <i data-lucide="x" aria-hidden="true"></i>
            </button>
        </header>
        <nav id="chapterNav" class="chapter-nav"></nav>
    </aside>

    <!-- Atlas drawer -->
    <aside id="atlasDrawer" class="drawer drawer-right" aria-hidden="true" aria-label="Atlas">
        <header class="drawer-head">
            <div>
                <span class="drawer-eyebrow">Reference</span>
                <h2>Atlas</h2>
            </div>
            <button class="icon-button drawer-close" type="button" data-close aria-label="Close atlas">
                <i data-lucide="x" aria-hidden="true"></i>
            </button>
        </header>

        <div class="drawer-body">
            <section class="atlas-section">
                <div class="section-title-row">
                    <h3>Influence map</h3>
                    <button class="icon-button" id="resetMap" type="button" aria-label="Reset influence map">
                        <i data-lucide="rotate-ccw" aria-hidden="true"></i>
                    </button>
                </div>
                <p class="atlas-note">Edges trace conceptual influence, not weight derivation. Llama, Qwen, DeepSeek, and Kimi were trained independently of GPT-3; the arrows show which work each branch responded to.</p>
                <canvas id="lineageCanvas" width="640" height="420" aria-hidden="true"></canvas>
                <div class="model-detail" id="modelDetail"></div>
                <details class="lineage-text">
                    <summary>Text view</summary>
                    <div id="lineageFallback"></div>
                </details>
            </section>

            <section class="atlas-section">
                <div class="section-title-row">
                    <h3>Chronology</h3>
                    <span id="timelineCount"></span>
                </div>
                <div class="era-filters" id="eraFilters"></div>
                <div class="timeline-list" id="timelineList"></div>
            </section>
        </div>
    </aside>

    <!-- Search overlay -->
    <div id="searchOverlay" class="overlay" aria-hidden="true" role="dialog" aria-label="Search">
        <div class="overlay-card">
            <label class="search-field" for="searchInput">
                <i data-lucide="search" aria-hidden="true"></i>
                <input id="searchInput" type="search" placeholder="Search chapters, models, events" autocomplete="off">
                <button class="icon-button overlay-close" type="button" data-close aria-label="Close search">
                    <i data-lucide="x" aria-hidden="true"></i>
                </button>
            </label>
            <div class="search-results" id="searchResults" hidden></div>
        </div>
    </div>

    <!-- Preserved hooks (kept hidden — populated harmlessly by app.js) -->
    <div class="visually-hidden" aria-hidden="true">
        <span id="chapterKicker"></span>
        <span id="eraBadge"></span>
        <span id="chapterRange"></span>
        <span id="chapterTags"></span>
        <span id="chapterBiblioTitle"></span>
        <div id="chapterReferences"></div>
        <div id="glossaryGrid"></div>
        <span id="glossaryCount"></span>
    </div>

    <div id="surfaceBackdrop" class="backdrop" hidden></div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
